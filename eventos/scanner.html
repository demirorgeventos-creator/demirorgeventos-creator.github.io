<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEMIR · Escáner</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --vino:#6B2D3E; --vino-deep:#4A1C2A; --dorado:#C9A84C;
  --crema:#FAF6F0; --verde:#2D6B4A; --rojo:#C0392B;
}
body { font-family:'Montserrat',sans-serif; background:#111; color:white; min-height:100vh; display:flex; flex-direction:column; }

/* LOGIN */
.login-wrap {
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  background:var(--vino-deep); padding:2rem;
}
.login-box { width:100%; max-width:340px; text-align:center; }
.login-logo { font-family:'Cormorant Garamond',serif; font-size:2rem; letter-spacing:8px; color:var(--dorado); margin-bottom:.5rem; }
.login-sub { font-size:9px; letter-spacing:3px; color:rgba(255,255,255,.4); margin-bottom:.5rem; text-transform:uppercase; }
.login-badge { display:inline-block; padding:.3rem .8rem; border:1px solid var(--dorado); color:var(--dorado); font-size:9px; letter-spacing:2px; margin-bottom:2rem; }
.login-label { font-size:10px; letter-spacing:2px; color:rgba(255,255,255,.5); margin-bottom:.5rem; text-transform:uppercase; }
.login-input {
  width:100%; padding:1rem; text-align:center; font-size:1.5rem; letter-spacing:6px;
  background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.15); color:white;
  font-family:'Montserrat',sans-serif; margin-bottom:1rem; outline:none;
}
.login-input:focus { border-color:var(--dorado); }
.login-btn {
  width:100%; padding:1rem; background:var(--dorado); color:var(--vino-deep); border:none;
  font-family:'Montserrat',sans-serif; font-size:11px; font-weight:700; letter-spacing:3px;
  text-transform:uppercase; cursor:pointer; margin-bottom:1rem;
}
.login-error { color:#ff6b6b; font-size:11px; display:none; margin-bottom:.75rem; }
.login-select {
  width:100%; padding:.75rem 1rem; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.15);
  color:white; font-family:'Montserrat',sans-serif; font-size:12px; margin-bottom:1rem; outline:none;
}
.login-select option { background:var(--vino-deep); color:white; }

/* HEADER SCANNER */
.scanner-header {
  background:var(--vino-deep); padding:1rem 1.25rem;
  display:flex; align-items:center; justify-content:space-between;
}
.scanner-logo { font-family:'Cormorant Garamond',serif; font-size:1.2rem; letter-spacing:4px; color:var(--dorado); }
.scanner-evento { font-size:10px; color:rgba(255,255,255,.5); letter-spacing:1px; }
.scanner-stats { display:flex; gap:1.25rem; }
.sc-stat { text-align:center; }
.sc-stat-num { font-size:1.3rem; font-weight:600; color:var(--dorado); }
.sc-stat-lbl { font-size:8px; color:rgba(255,255,255,.4); letter-spacing:1px; text-transform:uppercase; }

/* VISOR */
.scanner-body { flex:1; display:flex; flex-direction:column; }
.camera-wrap { position:relative; background:#000; flex-shrink:0; }
#qr-reader { width:100%; }
.camera-overlay {
  position:absolute; inset:0; pointer-events:none;
  display:flex; align-items:center; justify-content:center;
}
.scan-frame {
  width:220px; height:220px; border:2px solid var(--dorado);
  box-shadow:0 0 0 9999px rgba(0,0,0,.5);
  position:relative;
}
.scan-frame::before, .scan-frame::after {
  content:''; position:absolute; width:24px; height:24px; border-color:var(--dorado); border-style:solid;
}
.scan-frame::before { top:-3px; left:-3px; border-width:3px 0 0 3px; }
.scan-frame::after  { bottom:-3px; right:-3px; border-width:0 3px 3px 0; }
.scan-line {
  position:absolute; top:0; left:0; right:0; height:2px;
  background:linear-gradient(90deg,transparent,var(--dorado),transparent);
  animation:scanMove 2s linear infinite;
}
@keyframes scanMove { 0%{top:0} 100%{top:100%} }

/* Resultado */
.resultado-wrap {
  flex:1; padding:1.25rem; display:flex; flex-direction:column; gap:1rem; overflow-y:auto;
}

.resultado-card {
  border-radius:0; overflow:hidden; animation:slideUp .3s ease;
}
@keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }

.res-header { padding:1rem 1.25rem; display:flex; align-items:center; gap:.75rem; }
.res-icon { font-size:1.75rem; }
.res-titulo { font-family:'Cormorant Garamond',serif; font-size:1.3rem; }
.res-sub { font-size:10px; letter-spacing:1px; opacity:.8; }

.res-ok    { background:var(--verde); }
.res-ya    { background:#8a6d00; }
.res-error { background:var(--rojo); }

.res-body { background:rgba(255,255,255,.05); padding:1rem 1.25rem; }
.res-campo { display:flex; justify-content:space-between; padding:.4rem 0; border-bottom:1px solid rgba(255,255,255,.08); font-size:12px; }
.res-campo:last-child { border:none; }
.res-campo-lbl { color:rgba(255,255,255,.5); font-size:10px; letter-spacing:1px; text-transform:uppercase; }
.res-campo-val { font-weight:600; }

.btn-nuevo-scan {
  width:100%; padding:1rem; background:var(--dorado); color:var(--vino-deep);
  border:none; font-family:'Montserrat',sans-serif; font-size:12px; font-weight:700;
  letter-spacing:2px; text-transform:uppercase; cursor:pointer; flex-shrink:0;
}

/* Lista recientes */
.recientes { }
.recientes-titulo { font-size:9px; letter-spacing:2px; color:rgba(255,255,255,.3); text-transform:uppercase; margin-bottom:.75rem; }
.reciente-item { display:flex; align-items:center; gap:.75rem; padding:.6rem 0; border-bottom:1px solid rgba(255,255,255,.06); font-size:12px; }
.reciente-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.dot-ok    { background:var(--verde); }
.dot-ya    { background:#C9A84C; }
.dot-error { background:var(--rojo); }
.reciente-nombre { flex:1; }
.reciente-hora { font-size:10px; color:rgba(255,255,255,.3); }

/* Buscar manual */
.buscar-wrap { background:rgba(255,255,255,.05); padding:1rem 1.25rem; }
.buscar-titulo { font-size:9px; letter-spacing:2px; color:rgba(255,255,255,.4); text-transform:uppercase; margin-bottom:.75rem; }
.buscar-input {
  width:100%; padding:.75rem 1rem; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.15);
  color:white; font-family:'Montserrat',sans-serif; font-size:13px; outline:none; margin-bottom:.75rem;
}
.buscar-input:focus { border-color:var(--dorado); }
.buscar-resultados { max-height:200px; overflow-y:auto; }
.buscar-item {
  padding:.6rem .75rem; font-size:12px; cursor:pointer; border-bottom:1px solid rgba(255,255,255,.06);
  display:flex; justify-content:space-between; align-items:center; transition:background .15s;
}
.buscar-item:hover { background:rgba(255,255,255,.08); }
.buscar-item-nombre { }
.buscar-item-mesa { font-size:10px; color:rgba(255,255,255,.4); }
.buscar-item-badge { font-size:9px; padding:.2rem .5rem; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-wrap" class="login-wrap">
  <div class="login-box">
    <div class="login-logo">DEMIR</div>
    <div class="login-sub">Wedding & Event Planner</div>
    <div class="login-badge">MODO ESCÁNER</div>

    <div class="login-label">Selecciona el evento</div>
    <select class="login-select" id="login-evento-select">
      <option value="">Cargando eventos...</option>
    </select>

    <div class="login-label">PIN de Staff</div>
    <input class="login-input" id="login-pin" type="password" maxlength="8" placeholder="· · · ·"
      onkeydown="if(event.key==='Enter')entrar()">
    <div class="login-error" id="login-error">PIN incorrecto.</div>
    <button class="login-btn" onclick="entrar()">Entrar al escáner</button>
  </div>
</div>

<!-- SCANNER APP -->
<div id="scanner-app" style="display:none;flex:1;display:none;flex-direction:column;min-height:100vh;">

  <div class="scanner-header">
    <div>
      <div class="scanner-logo">DEMIR</div>
      <div class="scanner-evento" id="sc-evento-nombre">—</div>
    </div>
    <div class="scanner-stats">
      <div class="sc-stat"><div class="sc-stat-num" id="sc-total">0</div><div class="sc-stat-lbl">Total</div></div>
      <div class="sc-stat"><div class="sc-stat-num" id="sc-ingresados" style="color:#6fcf97">0</div><div class="sc-stat-lbl">Ingresados</div></div>
      <div class="sc-stat"><div class="sc-stat-num" id="sc-pendientes" style="color:var(--dorado)">0</div><div class="sc-stat-lbl">Pendientes</div></div>
    </div>
  </div>

  <!-- Modo banner -->
  <div id="sc-modo-banner" style="padding:.6rem 1.25rem;display:flex;align-items:center;justify-content:space-between;font-size:10px;letter-spacing:1px;">
    <span id="sc-modo-label">🧪 MODO PRUEBA</span>
    <button id="sc-btn-limpiar" onclick="limpiarPruebasScanner()" style="background:rgba(255,255,255,.1);border:none;color:rgba(255,255,255,.7);padding:.3rem .75rem;font-size:9px;cursor:pointer;letter-spacing:1px;">🗑️ Limpiar pruebas</button>
  </div>

  <div class="scanner-body" id="scanner-body-main">

    <!-- Cámara -->
    <div class="camera-wrap">
      <div id="qr-reader"></div>
      <div class="camera-overlay">
        <div class="scan-frame">
          <div class="scan-line"></div>
        </div>
      </div>
    </div>

    <div class="resultado-wrap" id="resultado-wrap">

      <!-- Resultado del scan -->
      <div id="resultado-card" style="display:none;"></div>

      <!-- Buscar manual -->
      <div class="buscar-wrap">
        <div class="buscar-titulo">🔍 Buscar invitado manualmente</div>
        <input class="buscar-input" id="buscar-input" placeholder="Nombre del invitado..." oninput="buscarInvitado()">
        <div class="buscar-resultados" id="buscar-resultados"></div>
      </div>

      <!-- Recientes -->
      <div class="recientes" id="recientes-wrap" style="display:none;">
        <div class="recientes-titulo">Últimos registros</div>
        <div id="recientes-lista"></div>
      </div>

    </div>

  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get, update, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ⚠️ REEMPLAZA CON TU CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyB45I1lwpPZmUJxFB5hu_xtXAwX709PPxc",
  authDomain: "demirqr-cb84d.firebaseapp.com",
  databaseURL: "https://demirqr-cb84d-default-rtdb.firebaseio.com",
  projectId: "demirqr-cb84d",
  storageBucket: "demirqr-cb84d.appspot.com",
  messagingSenderId: "172090319379",
  appId: "1:172090319379:web:b9577cb84f0e6c2c4495e6"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

let eventosData = {};
let invitadosData = {};
let eventoActual = null;
let qrScanner = null;
let recientes = [];
let scanCooldown = false;

// Cargar eventos para el select
onValue(ref(db,'eventos'), snap=>{
  eventosData = snap.val()||{};
  const sel = document.getElementById('login-evento-select');
  sel.innerHTML='<option value="">— Selecciona un evento —</option>';
  Object.entries(eventosData).forEach(([id,ev])=>{
    const opt=document.createElement('option');
    opt.value=id; opt.textContent=`${ev.nombre} · ${formatFecha(ev.fecha)}`;
    sel.appendChild(opt);
  });
});

// Si viene con parámetro ?evento=xxx pre-seleccionar
const params = new URLSearchParams(window.location.search);
const evParam = params.get('evento');
if(evParam){ setTimeout(()=>{ document.getElementById('login-evento-select').value=evParam; },500); }

window.entrar = function(){
  const evId = document.getElementById('login-evento-select').value;
  const pin  = document.getElementById('login-pin').value.trim();
  const ev   = eventosData[evId];
  if(!ev){ document.getElementById('login-error').style.display='block'; document.getElementById('login-error').textContent='Selecciona un evento'; return; }
  if(pin !== ev.pinStaff && pin !== ev.pinAdmin){ document.getElementById('login-error').style.display='block'; document.getElementById('login-error').textContent='PIN incorrecto.'; return; }

  eventoActual = evId;
  document.getElementById('login-wrap').style.display='none';
  document.getElementById('scanner-app').style.display='flex';
  document.getElementById('sc-evento-nombre').textContent=ev.nombre;

  // Escuchar modo en tiempo real
  onValue(ref(db,`eventos/${evId}/modoReal`), snap=>{
    const esReal = snap.val()||false;
    const banner = document.getElementById('sc-modo-banner');
    const label  = document.getElementById('sc-modo-label');
    const btnL   = document.getElementById('sc-btn-limpiar');
    if(esReal){
      banner.style.background = 'rgba(45,107,74,.35)';
      label.textContent = '🎯 MODO REAL — Registros definitivos';
      btnL.style.display = 'none';
    } else {
      banner.style.background = 'rgba(201,168,76,.15)';
      label.textContent = '🧪 MODO PRUEBA — Los registros se pueden borrar';
      btnL.style.display = 'inline-block';
    }
  });

  // Escuchar invitados
  onValue(ref(db,`invitados/${evId}`), snap=>{
    invitadosData = snap.val()||{};
    actualizarStatsScanner();
  });

  iniciarScanner();
};

function actualizarStatsScanner(){
  const arr    = Object.values(invitadosData);
  const ev     = eventosData[eventoActual]||{};
  const esReal = ev.modoReal||false;
  const total  = arr.length;
  const ing    = esReal
    ? arr.filter(i=>i.ingresado).length
    : arr.filter(i=>i.ingresadoPrueba||i.ingresado).length;
  document.getElementById('sc-total').textContent      = total;
  document.getElementById('sc-ingresados').textContent = ing;
  document.getElementById('sc-pendientes').textContent = total-ing;
}

function iniciarScanner(){
  qrScanner = new Html5Qrcode("qr-reader");
  qrScanner.start(
    {facingMode:"environment"},
    {fps:10, qrbox:{width:220,height:220}},
    onScanSuccess,
    ()=>{}
  ).catch(e=>{ console.error(e); mostrarResultado('error',null,'Sin acceso a cámara','Usa la búsqueda manual'); });
}

async function onScanSuccess(text){
  if(scanCooldown) return;
  scanCooldown = true;
  setTimeout(()=>scanCooldown=false, 3000);

  // Extraer id del URL escaneado
  let invId = null;
  try {
    const url = new URL(text);
    invId = url.searchParams.get('id');
  } catch { invId = text; }

  if(!invId || !invitadosData[invId]){ mostrarResultado('error',null,'Pase no válido','Este QR no corresponde a este evento'); return; }

  await registrarIngreso(invId);
}

async function registrarIngreso(invId){
  const inv    = invitadosData[invId];
  const ev     = eventosData[eventoActual]||{};
  const esReal = ev.modoReal||false;
  const hora   = new Date().toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});
  if(!inv){ mostrarResultado('error',null,'Invitado no encontrado','—'); return; }

  if(esReal){
    if(inv.ingresado){
      mostrarResultado('dup',inv,'⚠️ DUPLICADO','Este pase ya fue utilizado');
      addReciente(inv,'ya');
      return;
    }
    await update(ref(db,`invitados/${eventoActual}/${invId}`),{ingresado:true,horaIngreso:hora});
    mostrarResultado('ok',inv,'¡Bienvenido!','Acceso autorizado ✓');
    addReciente(inv,'ok');
  } else {
    if(inv.ingresadoPrueba){
      mostrarResultado('ya',inv,'Ya escaneado (prueba)','Escaneo de prueba previo detectado');
      addReciente(inv,'ya');
      return;
    }
    await update(ref(db,`invitados/${eventoActual}/${invId}`),{ingresadoPrueba:true,horaPrueba:hora});
    mostrarResultado('ok',inv,'✓ Prueba OK','Registro de prueba guardado');
    addReciente(inv,'ok');
  }
}

window.limpiarPruebasScanner = async function(){
  if(!confirm('¿Borrar todos los registros de prueba?')) return;
  const updates = {};
  Object.keys(invitadosData).forEach(id=>{
    updates[`invitados/${eventoActual}/${id}/ingresadoPrueba`] = null;
    updates[`invitados/${eventoActual}/${id}/horaPrueba`]      = null;
  });
  await update(ref(db), updates);
  document.getElementById('resultado-card').style.display='none';
};

function mostrarResultado(tipo, inv, titulo, sub){
  const card = document.getElementById('resultado-card');
  const clases = {ok:'res-ok',ya:'res-ya',error:'res-error',dup:'res-error'};
  const iconos  = {ok:'✅',ya:'⚠️',error:'❌',dup:'🚫'};

  let body='';
  if(inv){
    body=`<div class="res-body">
      <div class="res-campo"><span class="res-campo-lbl">Nombre</span><span class="res-campo-val">${inv.nombre}</span></div>
      ${inv.mesa?`<div class="res-campo"><span class="res-campo-lbl">Mesa</span><span class="res-campo-val">${inv.mesa}</span></div>`:''}
      ${inv.acompanantes?`<div class="res-campo"><span class="res-campo-lbl">Acomp.</span><span class="res-campo-val" style="font-size:11px">${inv.acompanantes}</span></div>`:''}
      ${inv.rsvp?`<div class="res-campo"><span class="res-campo-lbl">RSVP</span><span class="res-campo-val">${inv.rsvp}</span></div>`:''}
    </div>`;
  }

  card.innerHTML=`
    <div class="resultado-card">
      <div class="res-header ${clases[tipo]}">
        <div class="res-icon">${iconos[tipo]}</div>
        <div><div class="res-titulo">${titulo}</div><div class="res-sub">${sub}</div></div>
      </div>
      ${body}
    </div>`;
  card.style.display='block';
  card.scrollIntoView({behavior:'smooth'});
}

function addReciente(inv, tipo){
  const hora = new Date().toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});
  recientes.unshift({nombre:inv.nombre,tipo,hora});
  if(recientes.length>20) recientes.pop();
  renderRecientes();
}

function renderRecientes(){
  const wrap=document.getElementById('recientes-wrap');
  const lista=document.getElementById('recientes-lista');
  if(!recientes.length){ wrap.style.display='none'; return; }
  wrap.style.display='block';
  lista.innerHTML='';
  recientes.slice(0,10).forEach(r=>{
    const el=document.createElement('div');
    el.className='reciente-item';
    el.innerHTML=`<div class="reciente-dot dot-${r.tipo}"></div><div class="reciente-nombre">${r.nombre}</div><div class="reciente-hora">${r.hora}</div>`;
    lista.appendChild(el);
  });
}

// Búsqueda manual
window.buscarInvitado = function(){
  const q = document.getElementById('buscar-input').value.toLowerCase().trim();
  const wrap = document.getElementById('buscar-resultados');
  wrap.innerHTML='';
  if(!q) return;

  const matches = Object.entries(invitadosData).filter(([,inv])=>inv.nombre.toLowerCase().includes(q));
  if(!matches.length){ wrap.innerHTML='<div style="font-size:11px;color:rgba(255,255,255,.3);padding:.5rem 0">Sin resultados</div>'; return; }

  matches.slice(0,8).forEach(([id,inv])=>{
    const el=document.createElement('div');
    el.className='buscar-item';
    el.innerHTML=`
      <div>
        <div class="buscar-item-nombre">${inv.nombre}</div>
        <div class="buscar-item-mesa">${inv.mesa||''} ${inv.acompanantes?'· '+inv.acompanantes:''}</div>
      </div>
      <span class="buscar-item-badge ${inv.ingresado?'estado-ingresado':inv.rsvp==='confirmado'?'estado-confirmado':'estado-pendiente'}" style="display:inline-block;padding:.2rem .5rem;font-size:9px;letter-spacing:1px;font-weight:600">
        ${inv.ingresado?'✓ INGRESÓ':inv.rsvp==='confirmado'?'CONF.':'PEND.'}
      </span>`;
    el.onclick=()=>{ registrarIngreso(id); document.getElementById('buscar-input').value=''; wrap.innerHTML=''; };
    wrap.appendChild(el);
  });
};

function formatFecha(f){
  if(!f) return '—';
  const [y,m,d]=f.split('-');
  const meses=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  return `${d} ${meses[parseInt(m)-1]} ${y}`;
}
</script>
</body>
</html>
