<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEMIR · Margo & Gerard0</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#FAF6F0;font-family:'Montserrat',sans-serif;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(185,148,56,.07) 1px,transparent 1px),linear-gradient(90deg,rgba(185,148,56,.07) 1px,transparent 1px);background-size:60px 60px;}
.box{background:white;padding:52px 44px;max-width:400px;width:90%;border:1px solid rgba(185,148,56,.2);box-shadow:0 20px 60px rgba(123,45,66,.08);position:relative;z-index:1;}
.logo{font-family:'Cormorant Garamond',serif;font-size:30px;letter-spacing:10px;color:#7B2D42;text-align:center;margin-bottom:6px;}
.logo span{color:#B99438;}
.tag{font-size:9px;letter-spacing:4px;text-transform:uppercase;color:#8a7070;text-align:center;margin-bottom:36px;}
.couple{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:24px;color:#7B2D42;text-align:center;margin-bottom:28px;}
.lbl{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#8a7070;display:block;margin-bottom:10px;}
input{width:100%;border:none;border-bottom:1px solid #F2EBE0;padding:12px 0;font-size:16px;color:#3a2028;background:transparent;outline:none;text-align:center;letter-spacing:4px;}
input:focus{border-bottom-color:#B99438;}
button{width:100%;margin-top:28px;padding:16px;background:#7B2D42;color:#FAF6F0;border:none;font-size:12px;letter-spacing:4px;text-transform:uppercase;cursor:pointer;font-family:'Montserrat',sans-serif;}
button:hover{background:#5a1e2e;}
.err{margin-top:14px;text-align:center;font-size:12px;color:#c0392b;display:none;font-style:italic;}
</style>
</head>
<body>
<div class="box">
  <div class="logo">D<span>·</span>EMIR</div>
  <div class="tag">Wedding &amp; Event Planner</div>
  <div class="couple">Margo &amp; Gerardo</div>
  <label class="lbl">Contraseña de acceso</label>
  <input type="password" id="pwd" placeholder="••••••••" autocomplete="off">
  <button onclick="check()">Acceder a mi agenda</button>
  <div class="err" id="err">Contraseña incorrecta. Intenta de nuevo.</div>
</div>
<script>
function check(){
  var v = document.getElementById('pwd').value;
  if(v === 'demir12'){
    sessionStorage.setItem('demir_modo', 'editor');
    window.location.href = '/mi-agenda/margo-gera/agenda.html';
  } else if(v === '241026'){
    sessionStorage.setItem('demir_modo', 'lectura');
    window.location.href = '/mi-agenda/margo-gera/agenda.html';
  } else {
    document.getElementById('err').style.display = 'block';
    document.getElementById('pwd').value = '';
    document.getElementById('pwd').focus();
  }
}
document.getElementById('pwd').addEventListener('keydown', function(e){
  if(e.key === 'Enter') check();
});
</script>
</body>
</html>
